<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Professional CV and portfolio overview for Alexandr Culka."
    />
    <title>Alexandr Culka | CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <div class="hero-layout">
            <div class="hero-text">
              <p class="eyebrow">Curriculum Vitae</p>
              <h1 id="full-name">Alexandr Culka</h1>
              <p id="headline" class="headline"></p>
              <p id="summary" class="summary"></p>
              <ul id="contact-list" class="contact-list"></ul>
            </div>
            <div class="hero-photo-wrap">
              <button class="hero-photo-frame" id="photo-trigger" aria-label="View full-size photo" type="button">
                <img
                  src="_images/2026-04-08%2022_32_13-IMG_6549.JPG.webp"
                  alt="Alexandr Culka"
                  class="hero-photo"
                  draggable="false"
                />
                <span class="photo-zoom-hint" aria-hidden="true">⤢</span>
              </button>
              <!-- <div class="hero-photo-badge" aria-hidden="true">
                <span class="badge-dot"></span>
                Open to work
              </div> -->
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="content-grid">
          <article class="panel panel-wide">
            <div class="section-heading">
              <p class="section-kicker">Profile</p>
              <h2>About</h2>
            </div>
            <p id="about-text" class="body-copy"></p>
          </article>

          <article class="panel">
            <div class="section-heading">
              <p class="section-kicker">Focus</p>
              <h2>Core Skills</h2>
            </div>
            <ul id="skills-list" class="tag-list"></ul>
          </article>

          <article class="panel">
            <div class="section-heading">
              <p class="section-kicker">Background</p>
              <h2>Education</h2>
            </div>
            <div id="education-list" class="stack-list"></div>
          </article>

          <article class="panel panel-wide">
            <div class="section-heading">
              <p class="section-kicker">Career</p>
              <h2>Experience</h2>
            </div>
            <div id="experience-list" class="timeline"></div>
          </article>

          <article class="panel panel-full">
            <div class="section-heading">
              <p class="section-kicker">Selected Work</p>
              <h2>Selected Projects</h2>
            </div>
            <div id="projects-list" class="projects-grid"></div>
          </article>
        </section>
      </main>
    </div>

    <!-- Lightbox -->
    <div id="photo-lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Full-size photo" hidden>
      <div class="lightbox-backdrop"></div>
      <div class="lightbox-content">
        <img src="_images/IMG_6549.webp" alt="Alexandr Culka — full size" class="lightbox-img" draggable="false" />
        <button class="lightbox-close" id="lightbox-close" aria-label="Close" type="button">&times;</button>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
